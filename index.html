<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор идей | Крутящаяся кость 🎲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎲 Генератор идей 🎲</h1>
        <p class="subtitle">Нажми на красную кость — получи идею</p>

        <!-- КРАСНАЯ КРУГЛАЯ КНОПКА-КОСТЬ -->
        <div class="dice-button" id="diceBtn">
            🎲
        </div>

        <!-- Блок с идеей -->
        <div class="idea-box">
            <div class="idea-text" id="ideaText">
                Нажми на кость 👆
            </div>
        </div>

        <!-- Счётчик -->
        <div class="counter">
            💡 <span id="clickCount">0</span> идей получено
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
